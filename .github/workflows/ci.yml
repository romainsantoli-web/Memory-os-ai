name: CI — Tests & Coverage

on:
  push:
    branches: [main, feat/*, fix/*]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr ffmpeg antiword

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,audio]"

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --cov=memory_os_ai --cov-report=term-missing --cov-report=xml

      - name: Check coverage threshold (80%)
        run: |
          python -m pytest tests/ --cov=memory_os_ai --cov-fail-under=80 -q

      - name: Upload coverage artifact
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
